<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>zeefeer — панель управления</title>
  <style>
    :root {
      --bg: #0f0f12;
      --card: #18181c;
      --border: #2a2a30;
      --text: #e4e4e7;
      --muted: #71717a;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --accent: #3b82f6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1rem;
      line-height: 1.5;
    }
    .container { max-width: 560px; margin: 0 auto; }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--muted);
    }
    .logo {
      font-family: ui-monospace, monospace;
      letter-spacing: 0.05em;
      color: var(--text);
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .label { color: var(--muted); font-size: 0.875rem; }
    .value { font-weight: 500; }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 0.35rem;
      animation: pulse 2s ease-in-out infinite;
    }
    .status-dot.run { background: var(--green); }
    .status-dot.stop { background: var(--red); animation: none; }
    @keyframes pulse { 0%,100%{ opacity:1 } 50%{ opacity:0.6 } }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      padding: 0.5rem 0.9rem;
      font-size: 0.875rem;
      font-weight: 500;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: var(--border);
      color: var(--text);
      text-decoration: none;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn:hover { background: #3f3f46; }
    .btn:active { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn.primary { background: var(--accent); color: #fff; }
    .btn.primary:hover { background: #2563eb; }
    .btn.danger { background: var(--red); color: #fff; }
    .btn.danger:hover { background: #dc2626; }
    .btn.success { background: var(--green); color: #fff; }
    .btn.success:hover { background: #16a34a; }
    .btns { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
    .footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .footer a { color: var(--accent); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    .loading { opacity: 0.7; pointer-events: none; }
    .toast {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .toast.show { opacity: 1; }
    .toast.ok { background: var(--green); color: #fff; }
    .toast.err { background: var(--red); color: #fff; }
  </style>
</head>
<body>
  <div class="container">
    <h1><span class="logo">zeefeer</span> — панель управления</h1>

    <div class="card">
      <div class="row">
        <span class="label">Zapret</span>
        <span class="value" id="zapret-status"><span class="status-dot stop"></span><span>—</span></span>
      </div>
      <div class="row">
        <span class="label">Стратегии</span>
        <span class="value" id="strategies">—</span>
      </div>
      <div class="row">
        <span class="label">Провайдер</span>
        <span class="value" id="provider">—</span>
      </div>
      <div class="btns">
        <button type="button" class="btn primary" id="btn-restart" title="Перезапуск zapret">Перезапуск</button>
        <button type="button" class="btn danger" id="btn-stop" title="Остановить">Стоп</button>
        <button type="button" class="btn success" id="btn-start" title="Запустить">Старт</button>
        <button type="button" class="btn" id="btn-refresh" title="Обновить данные">Обновить</button>
      </div>
    </div>

    <div class="card">
      <div class="row">
        <span class="label">Быстрые действия</span>
      </div>
      <div class="btns">
        <a href="#" class="btn primary" id="link-terminal" target="_blank" rel="noopener">Терминал (ttyd)</a>
      </div>
    </div>

    <div class="footer">
      Полная настройка — через пункт меню в терминале (z4r). Саппорт: tg zee4r
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API = '/api';
    const toast = document.getElementById('toast');
    const els = {
      zapret: document.getElementById('zapret-status'),
      strategies: document.getElementById('strategies'),
      provider: document.getElementById('provider'),
      btnRestart: document.getElementById('btn-restart'),
      btnStop: document.getElementById('btn-stop'),
      btnStart: document.getElementById('btn-start'),
      btnRefresh: document.getElementById('btn-refresh'),
    };

    function showToast(msg, ok) {
      toast.textContent = msg;
      toast.className = 'toast show ' + (ok ? 'ok' : 'err');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function setLoading(loading) {
      [els.btnRestart, els.btnStop, els.btnStart, els.btnRefresh].forEach(b => {
        b.classList.toggle('loading', loading);
      });
    }

    async function fetchJson(path, opts) {
      const r = await fetch(API + path, { ...opts, headers: { ...(opts && opts.headers), Accept: 'application/json' } });
      if (!r.ok) throw new Error(r.statusText || 'Ошибка');
      return r.json();
    }

    async function loadStatus() {
      setLoading(true);
      try {
        const d = await fetchJson('/status');
        const run = d.zapret === 'run';
        els.zapret.innerHTML = '<span class="status-dot ' + (run ? 'run' : 'stop') + '"></span>' + (run ? 'Запущен' : 'Остановлен');
        els.strategies.textContent = d.strategies || '—';
        els.provider.textContent = d.provider || '—';
        els.btnStart.disabled = run;
        els.btnStop.disabled = !run;
        els.btnRestart.disabled = false;
      } catch (e) {
        els.zapret.innerHTML = '<span class="status-dot stop"></span>Ошибка';
        els.strategies.textContent = '—';
        els.provider.textContent = '—';
        showToast('Не удалось загрузить статус', false);
      }
      setLoading(false);
    }

    async function action(name) {
      setLoading(true);
      try {
        const d = await fetchJson('/' + name, { method: 'POST' });
        showToast(d.message || 'Готово', true);
        await loadStatus();
      } catch (e) {
        showToast(e.message || 'Ошибка', false);
      }
      setLoading(false);
    }

    els.btnRefresh.addEventListener('click', loadStatus);
    els.btnRestart.addEventListener('click', () => action('restart'));
    els.btnStop.addEventListener('click', () => action('stop'));
    els.btnStart.addEventListener('click', () => action('start'));

    document.getElementById('link-terminal').href =
      window.location.protocol + '//' + window.location.hostname + ':17681';
    loadStatus();
  </script>
</body>
</html>
